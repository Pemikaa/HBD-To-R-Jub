<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBD to อาจุ๊บ 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body {
      margin: 0;
      font-family: 'Kanit', sans-serif;
      background: url('background.jpg') no-repeat center/cover fixed;
      color: #fff;
      overflow: hidden;
      overflow-x: hidden;
    }

    .overlay {
      position: fixed;
      inset: 0;
      backdrop-filter: blur(6px);
      background: linear-gradient(135deg, rgba(255,146,43,0.45), rgba(255,169,77,0.35));
    }

    .page {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; 
        text-align: center;
        padding: 20px;
    }

    h1 { font-size: 3em; margin: 0; }

    .cake { margin-top: 20px; cursor: pointer; }

    .flame {
      width: 20px;
      height: 30px;
      background: radial-gradient(circle, #fff176, #ff922b);
      border-radius: 50%;
      margin: auto;
      animation: flicker 0.2s infinite;
    }

    @keyframes flicker { 50%{transform:scale(1.25);} }

    /* PAGE 1 */
    .intro-card {
      background: rgba(255,165,80,0.25);
      padding: 30px 40px;
      border-radius: 24px;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    /* PAGE 2 */
    .page2 {
        display: none;
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        text-align: center;
        padding: 60px 20px 80px;
        box-sizing: border-box;
        overflow-y: auto;
        gap: 35px; 
    }

    #jubImg {
        position: relative;
        width: 90%;
        max-width: 320px;
        margin: 20px 0 10px 0;
        border-radius: 20px;
        box-shadow: 0 0 40px rgba(255,200,120,0.8), 0 0 120px rgba(255,180,80,0.7);
        animation: float 3s ease-in-out infinite, glowPulse 2s infinite ease-in-out;
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 20px rgba(255,165,80,0.4); }
      50% { box-shadow: 0 0 80px rgba(255,140,0,0.9); }
      100% { box-shadow: 0 0 20px rgba(255,165,80,0.4); }
    }

    .content-wrap {
        width: 90%;
        max-width: 750px;
        margin-top: 20px;
        z-index: 2;
        background: rgba(255,165,80,0.25);
        padding: 25px;
        border-radius: 24px;
        backdrop-filter: blur(6px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        text-align: center;
        padding: 30px 25px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px; 
        box-sizing: border-box;
        margin-bottom: 40px;
        transform: translateY(10px);
    }

    .content-wrap h1 {
        margin-top: 10px;
        white-space: nowrap;  
        font-size: clamp(18px, 4.5vw, 32px);
        line-height: 1.2;
        text-align: center;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(30px);} 
      to { opacity:1; transform: translateY(0);} 
    }

    .cake-big {
      font-size: 110px;
      animation: bounce 1s infinite alternate;
    }

    @keyframes bounce { to{transform:translateY(-20px);} }

    .wish {
        font-size: 1.4em;
        max-width: 700px;
        width: 95%;
        margin: 15px auto 0 auto;
        line-height: 1.6;
        text-align: center;
    }


    .sparkle {
      position: fixed;
      font-size: 18px;
      opacity: 0;
      animation: sparkleFloat 2.5s infinite ease-in-out;
      pointer-events: none;
      z-index: 1;
      filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 12px #ffd43b);
    }

    @keyframes sparkleFloat {
      0% { transform: translateY(0) scale(0.3); opacity: 0; }
      40% { transform: translateY(-15px) scale(1.6); opacity: 1; }
      70% { transform: translateY(-25px) scale(1.2); opacity: 0.9; }
      100% { transform: translateY(-40px) scale(0.3); opacity: 0; }
      50% { transform: translateY(-20px) scale(1.4); opacity: 1; }
      100% { transform: translateY(-40px) scale(0); opacity: 0; }
    }

    .light-flash {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background: radial-gradient(circle at 30% 30%, rgba(255,200,120,0.25), transparent 60%),
                    radial-gradient(circle at 70% 60%, rgba(255,180,80,0.2), transparent 60%);
        animation: flashMove 2.5s infinite ease-in-out;
        opacity: 0.4;
    }

    @keyframes flashMove {
        0% { opacity: 0.3; transform: scale(1); }
        25% { opacity: 0.7; transform: scale(1.05); }
        50% { opacity: 0.4; transform: scale(1.1); }
        75% { opacity: 0.8; transform: scale(1.03); }
        100% { opacity: 0.3; transform: scale(1); }
    }

    .light-flash::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 20%, rgba(255,220,150,0.2), transparent 70%);
        animation: flashMove 6s infinite alternate;
    }

    #countdown {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 7em;
      font-weight: bold;
      background: rgba(0,0,0,0);
      z-index: 999;
      animation: fadeDark 1s forwards;
    }

    @keyframes fadeDark {
      from { background: rgba(0,0,0,0); }
      to { background: rgba(0,0,0,0.8); }
    }

    #countdown span {
      display: inline-block;
      animation: pop 0.8s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
      50% { transform: scale(1.3) rotate(5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); }
    }

    .confetti {
      position: fixed;
      top: -10px;
      width: 8px;
      height: 14px;
      animation: fall linear forwards;
    }

    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

    @keyframes float {
        0%,100%{transform: translateY(0);} 
        50%{transform: translateY(-10px);} 
    }

    @media (min-width: 768px) {
        #jubImg {
            width: 320px;
        }
    }
  </style>
</head>
<body>

<div class="overlay"></div>
<div id="countdown"></div>

<!-- PAGE 1 -->
<div class="page" id="page1">
  <div class="intro-card">
    <h1>🎉 HBD to อาจุ๊บ 🎉</h1>
    <p>17 April ✨</p>

    <div class="cake" onclick="blowCandle()">
      <div class="flame" id="flame"></div>
      <div style="font-size:65px;">🧁</div>
      <p>กดเพื่อเป่าเทียน!</p>
    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page page2" id="page2">
  <img id="jubImg" src="R-Jub.jpg" />

  <div class="light-flash"></div>

  <div class="content-wrap">
    <div class="cake-big">🎂</div>
    <h1>Happy Birthday naka 🎉</h1>
    <p class="wish">
      ขอให้อาจุ๊บมีความสุขมากๆ สุขภาพแข็งแรง 🐑<br>
      มีเงินใช้เยอะๆ กินของอร่อยๆ ✨<br>
      กิ๊บรักอาจุ๊บนะ 🧡
    </p>
  </div>
</div>

<script>
  function blowCandle() {
    document.getElementById('flame').style.display = 'none';

    const cd = document.getElementById('countdown');
    cd.style.display = 'flex';

    let nums = ['3','2','1'];
    let i = 0;

    const interval = setInterval(() => {
      cd.innerHTML = '<span>' + nums[i] + '</span>';
      i++;
      if(i >= nums.length){
        clearInterval(interval);
        setTimeout(()=>{
          cd.style.display = 'none';
          page1.style.display = 'none';
          page2.style.display = 'flex';
          launchConfetti();
          createSparkles();
        },500);
      }
    },1000);
  }

  function launchConfetti(){
    for(let i=0;i<40;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100+'vw';
      c.style.background = ['#fff','#ffd43b','#ff6b6b','#69db7c'][Math.floor(Math.random()*4)];
      c.style.animationDuration = (3+Math.random()*3)+'s';
      document.body.appendChild(c);
    }
  }

  function createSparkles(){
    for(let i=0;i<40;i++){
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.innerText = '⭐';
      s.style.left = Math.random()*100+'vw';
      s.style.top = Math.random()*100+'vh';
      s.style.animationDelay = Math.random()*3 + 's';
      document.body.appendChild(s);
    }
  }
</script>

</body>
</html>
